<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>原付ルート β — 原付一種/二種対応ルートプランナー</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --c-main:#d9480f; --c-main-dark:#a03608; --c-accent:#1971c2;
  --c-bg:#ffffff; --c-panel:#ffffff; --c-line:#dee2e6; --c-text:#212529; --c-sub:#868e96;
  --radius:12px; --shadow:0 2px 10px rgba(0,0,0,.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;color:var(--c-text);}
#map{position:fixed;inset:0;z-index:0;}

/* ===== ヘッダー ===== */
#header{
  position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;
  padding:8px 10px;pointer-events:none;
}
#header .card{pointer-events:auto;}
#title{
  background:var(--c-main);color:#fff;font-weight:700;font-size:15px;
  padding:8px 12px;border-radius:var(--radius);box-shadow:var(--shadow);white-space:nowrap;
}
#title small{font-weight:400;opacity:.85;}
#vehicleToggle{
  display:flex;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
}
#vehicleToggle button{
  border:none;background:#fff;padding:9px 12px;font-size:13px;font-weight:700;color:var(--c-sub);cursor:pointer;
}
#vehicleToggle button.active{background:var(--c-main);color:#fff;}
#menuBtn{
  margin-left:auto;background:#fff;border:none;border-radius:var(--radius);box-shadow:var(--shadow);
  width:38px;height:38px;font-size:18px;cursor:pointer;pointer-events:auto;
}

/* ===== 検索パネル ===== */
#panel{
  position:fixed;top:56px;left:8px;right:8px;z-index:19;max-width:420px;
  background:var(--c-panel);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:10px;
}
@media(min-width:600px){ #panel{left:10px;right:auto;width:400px;} }
.ptrow{display:flex;align-items:center;gap:6px;margin-bottom:6px;position:relative;}
.ptrow .dot{width:12px;height:12px;border-radius:50%;flex:0 0 12px;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25);}
.dot.start{background:#2b8a3e;} .dot.goal{background:#c92a2a;} .dot.via{background:#e8890c;}
.ptrow input{
  flex:1;min-width:0;border:1px solid var(--c-line);border-radius:8px;padding:9px 8px;font-size:14px;
}
.ptrow input:focus{outline:2px solid var(--c-accent);border-color:transparent;}
.ptrow .rbtn{
  flex:0 0 34px;height:34px;border:1px solid var(--c-line);background:#f8f9fa;border-radius:8px;
  font-size:15px;cursor:pointer;padding:0;
}
.ptrow .rbtn.pickon{background:var(--c-accent);color:#fff;border-color:var(--c-accent);}
#panel .btnrow{display:flex;gap:6px;margin-top:8px;}
#panel .btnrow button{
  border:none;border-radius:8px;padding:10px 8px;font-size:13px;font-weight:700;cursor:pointer;
}
#addVia{background:#f1f3f5;color:var(--c-text);flex:0 0 auto;}
#swapBtn{background:#f1f3f5;color:var(--c-text);flex:0 0 auto;}
#patRow{display:flex;gap:6px;margin-top:2px;}
#patRow button{
  flex:1;border:1px solid var(--c-line);background:#fff;color:var(--c-sub);border-radius:8px;
  padding:7px 4px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
}
#patRow button.on{background:var(--c-main);color:#fff;border-color:var(--c-main);}
#routeBtn{background:var(--c-main);color:#fff;flex:1;}
#routeBtn:disabled{background:#ced4da;cursor:default;}
.suggest{
  position:absolute;top:100%;left:18px;right:0;z-index:30;background:#fff;border:1px solid var(--c-line);
  border-radius:8px;box-shadow:var(--shadow);max-height:180px;overflow-y:auto;
}
.suggest div{padding:9px 10px;font-size:13px;border-bottom:1px solid #f1f3f5;cursor:pointer;}
.suggest div:hover{background:#f8f9fa;}
#pickHint{
  display:none;position:fixed;left:50%;transform:translateX(-50%);top:56px;z-index:40;
  background:var(--c-accent);color:#fff;font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;box-shadow:var(--shadow);
}

/* ===== 結果パネル ===== */
#result{
  display:none;position:fixed;left:0;right:0;bottom:0;z-index:21;
  background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -2px 14px rgba(0,0,0,.25);
  max-height:55vh;display:none;flex-direction:column;
}
@media(min-width:600px){ #result{left:10px;right:auto;width:400px;border-radius:16px;bottom:10px;} }
#resultHead{padding:10px 14px 6px;flex:0 0 auto;}
#grip{width:44px;height:4px;background:#dee2e6;border-radius:2px;margin:0 auto 8px;}
#candRow{display:flex;gap:6px;margin:0 0 8px;flex-wrap:wrap;}
#candRow button{border:1px solid var(--c-line);background:#fff;border-radius:10px;padding:5px 9px;font-size:11.5px;font-weight:700;cursor:pointer;text-align:left;line-height:1.35;}
#candRow button .cv{display:block;font-weight:400;font-size:10.5px;color:var(--c-sub);}
#candRow button.on{background:var(--c-accent);color:#fff;border-color:var(--c-accent);}
#candRow button.on .cv{color:#e7f5ff;}
#summary{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
#summary .big{font-size:22px;font-weight:800;color:var(--c-main);}
#summary .mid{font-size:15px;font-weight:700;}
#summary .veh{font-size:12px;background:#fff4e6;color:var(--c-main-dark);padding:2px 8px;border-radius:10px;font-weight:700;}
#ferryNote{display:none;font-size:11px;color:var(--c-sub);margin-top:2px;}
#resultBtns{display:flex;gap:6px;padding:8px 14px;flex-wrap:wrap;flex:0 0 auto;}
#resultBtns button{
  border:1px solid var(--c-line);background:#fff;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;
}
#resultBtns button.on{background:var(--c-accent);color:#fff;border-color:var(--c-accent);}
#maneuvers{overflow-y:auto;padding:0 14px 14px;flex:1 1 auto;display:none;}
.mv{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid #f1f3f5;font-size:13px;cursor:pointer;}
.mv .ic{flex:0 0 22px;text-align:center;}
.mv .len{color:var(--c-sub);font-size:12px;}
#closeResult{position:absolute;top:8px;right:10px;border:none;background:none;font-size:18px;color:var(--c-sub);cursor:pointer;}

/* ===== トースト・免責 ===== */
#toast{
  display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:24vh;z-index:50;
  background:rgba(33,37,41,.92);color:#fff;font-size:13px;padding:10px 16px;border-radius:20px;max-width:88vw;text-align:center;
}
#disclaimer{
  position:fixed;bottom:2px;left:2px;z-index:5;font-size:9px;color:#495057;
  background:rgba(255,255,255,.75);padding:2px 6px;border-radius:6px;max-width:70vw;
}
#menuSheet{
  display:none;position:fixed;top:52px;right:8px;z-index:45;background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow);padding:6px;min-width:220px;
}
#menuSheet button{
  display:block;width:100%;text-align:left;border:none;background:none;padding:11px 10px;font-size:14px;cursor:pointer;border-radius:8px;
}
#menuSheet button:hover{background:#f8f9fa;}
#menuSheet .note{font-size:11px;color:var(--c-sub);padding:6px 10px;border-top:1px solid #f1f3f5;line-height:1.5;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:-2px;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ===== 一覧シート（履歴・お気に入り） ===== */
#sheet{
  display:none;position:fixed;left:0;right:0;bottom:0;z-index:60;flex-direction:column;
  background:#fff;border-radius:16px 16px 0 0;max-height:70vh;box-shadow:0 -2px 14px rgba(0,0,0,.3);
}
@media(min-width:600px){ #sheet{left:10px;right:auto;width:400px;border-radius:16px;bottom:10px;} }
#sheetHead{display:flex;align-items:center;padding:12px 14px 8px;flex:0 0 auto;}
#sheetTitle{font-size:15px;font-weight:800;flex:1;}
#sheetClear{border:none;background:none;color:var(--c-sub);font-size:12px;cursor:pointer;text-decoration:underline;margin-right:8px;}
#sheetClose{border:none;background:none;font-size:18px;color:var(--c-sub);cursor:pointer;}
#sheetBody{overflow-y:auto;padding:0 12px 14px;flex:1 1 auto;}
.srow{display:flex;align-items:center;gap:8px;padding:10px 2px;border-bottom:1px solid #f1f3f5;}
.srow .main{flex:1;min-width:0;cursor:pointer;}
.srow .t1{font-size:13.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.srow .t2{font-size:11px;color:var(--c-sub);margin-top:2px;}
.srow .rbtn2{flex:0 0 auto;border:1px solid var(--c-line);background:#f8f9fa;border-radius:8px;padding:7px 9px;font-size:12px;cursor:pointer;}
.sempty{padding:24px 8px;text-align:center;color:var(--c-sub);font-size:13px;}

/* ===== 入力ダイアログ（お気に入り名・地点登録） ===== */
#formSheet{
  display:none;position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:70;
  background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.35);padding:16px;width:min(92vw,340px);
}
#formTitle{font-size:14px;font-weight:800;margin-bottom:10px;}
#emojiRow{display:none;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
#emojiRow button{font-size:20px;padding:5px 7px;border:2px solid transparent;border-radius:8px;background:#f8f9fa;cursor:pointer;}
#emojiRow button.sel{border-color:var(--c-main);background:#fff4e6;}
#formName{width:100%;border:1px solid var(--c-line);border-radius:8px;padding:10px 8px;font-size:14px;}
#formSearchBlock{display:none;margin-bottom:10px;}
#formSearchRow{display:flex;gap:6px;}
#formSearch{flex:1;min-width:0;border:1px solid var(--c-line);border-radius:8px;padding:9px 8px;font-size:14px;}
#formSearch:focus{outline:2px solid var(--c-accent);border-color:transparent;}
#formSearchBtn{flex:0 0 34px;height:34px;border:1px solid var(--c-line);background:#f8f9fa;border-radius:8px;font-size:15px;cursor:pointer;padding:0;}
#formSuggest div{padding:9px 10px;font-size:13px;border:1px solid var(--c-line);border-top:none;cursor:pointer;background:#fff;}
#formSuggest div:first-child{border-top:1px solid var(--c-line);border-radius:8px 8px 0 0;}
#formSuggest div:last-child{border-radius:0 0 8px 8px;}
#formSuggest div:hover{background:#f8f9fa;}
#formMapPick{display:none;width:100%;margin-top:8px;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;background:#f1f3f5;color:var(--c-text);}
#formBtns{display:flex;gap:8px;margin-top:12px;}
#formBtns button{flex:1;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
#formCancel{background:#f1f3f5;}
#formSave{background:var(--c-main);color:#fff;}
</style>
</head>
<body>
<div id="map"></div>

<div id="header">
  <div id="title" class="card">🛵 原付ルート <small>β</small></div>
  <div id="vehicleToggle" class="card">
    <button id="veh50" class="active">原付一種<br><span style="font-size:10px;font-weight:400">〜50cc</span></button>
    <button id="veh125">原付二種<br><span style="font-size:10px;font-weight:400">〜125cc</span></button>
  </div>
  <button id="menuBtn" class="card">☰</button>
</div>

<div id="panel">
  <div id="ptrows"></div>
  <div id="patRow"></div>
  <div class="btnrow">
    <button id="addVia">＋経由地</button>
    <button id="swapBtn" title="出発地と目的地を入れ替え">⇅</button>
    <button id="routeBtn">ルート検索</button>
  </div>
</div>

<div id="pickHint">地図をタップして地点を指定 （もう一度ボタンを押すと解除）</div>

<div id="result">
  <button id="closeResult">✕</button>
  <div id="resultHead">
    <div id="grip"></div>
    <div id="candRow"></div>
    <div id="summary"></div>
    <div id="ferryNote"></div>
  </div>
  <div id="resultBtns">
    <button id="mvToggle">📋 案内一覧</button>
    <button id="cmpToggle">🚗 車ルート比較</button>
    <button id="favBtn">⭐ お気に入り</button>
    <button id="gmapBtn">🗺 Googleマップ</button>
    <button id="gpxBtn">💾 GPX保存</button>
    <button id="shareBtn">🔗 共有URL</button>
  </div>
  <div id="maneuvers"></div>
</div>

<div id="menuSheet">
  <button id="locBtn">📍 現在地を出発地にする</button>
  <button id="histBtn">🕘 検索履歴</button>
  <button id="favListBtn">⭐ お気に入りルート</button>
  <button id="placeBtn">🚩 地点を登録</button>
  <button id="clearBtn">🗑 ルートと地点をクリア</button>
  <div class="note">
    ルート検索: Valhalla (FOSSGIS) / 地名検索: Nominatim<br>
    地図: 国内=地理院タイル・国外=OpenStreetMap（自動切替）<br>
    🌍 ヨーロッパ等でも利用可。日本国外では一種相当をEUモペッド(上限45km/h)として検索します。<br>
    オープンデータのため通行可否が実際と異なる場合があります。
  </div>
</div>

<div id="sheet">
  <div id="sheetHead">
    <span id="sheetTitle"></span>
    <button id="sheetClear">全消去</button>
    <button id="sheetClose">✕</button>
  </div>
  <div id="sheetBody"></div>
</div>

<div id="formSheet">
  <div id="formTitle"></div>
  <div id="emojiRow"></div>
  <div id="formSearchBlock">
    <div id="formSearchRow">
      <input id="formSearch" type="text" placeholder="場所を検索（例: 道の駅◯◯）" autocomplete="off">
      <button id="formSearchBtn" title="場所を検索">🔍</button>
    </div>
    <div id="formSuggest"></div>
  </div>
  <input id="formName" type="text" placeholder="名前">
  <button id="formMapPick">🗺 地図をタップして選ぶ</button>
  <div id="formBtns">
    <button id="formCancel">キャンセル</button>
    <button id="formSave">保存</button>
  </div>
</div>

<div id="toast"></div>
<div id="disclaimer">⚠️ 参考情報です。通行可否の最終判断は現地の標識・法令に従ってください。 地図: 国土地理院 / © OpenStreetMap contributors</div>

<script>
"use strict";
/* =========================================================
   原付ルート β — フェーズ1: ルートプランナー
   ルート検索: Valhalla 公開サーバー (motor_scooter costing)
   ========================================================= */
const VALHALLA = "https://valhalla1.openstreetmap.de/route";
const NOMINATIM = "https://nominatim.openstreetmap.org";
const CLIENT_ID = "gentsuki-route-beta";

const VEHICLES = {
  v50:  { label:"原付一種(〜50cc)",  short:"一種 50cc",  usePrimary:0.35, tollPenalty:14400 },
  v125: { label:"原付二種(〜125cc)", short:"二種 125cc", usePrimary:0.6,  tollPenalty:7200 }
};
let vehicle = "v50";
let lastTopSpeed = null;   // 直近リクエストで使った上限速度
let lastRegionJP = true;   // 直近リクエストの地域判定

/* 地域判定: 日本国内かどうか（車両クラスの法定上限とタイルの切替に使用） */
function inJapanLL(lat, lon) {
  return lat >= 20 && lat <= 46 && lon >= 122 && lon <= 154;
}
function routeRegionJP() {
  const p = points.find(q => q.lat != null);
  if (p) return inJapanLL(p.lat, p.lon);
  const c = map.getCenter();
  return inJapanLL(c.lat, c.lng);
}
/* 一種: 日本30km/h / EU等モペッド(L1e)45km/h。二種: 60km/h */
function currentTopSpeed(jp) {
  return vehicle === "v50" ? (jp ? 30 : 45) : 60;
}

/* ---------- 状態 ---------- */
// points: {kind:'start'|'via'|'goal', name, lat, lon}  lat/lon が null なら未設定
let points = [
  { kind:"start", name:"", lat:null, lon:null },
  { kind:"goal",  name:"", lat:null, lon:null }
];
let pickTarget = -1;          // 地図タップで設定する対象 index (-1: off)
let markers = [];
let routeLayer = null, routeCasing = null, carLayer = null;
let lastTrip = null, lastShape = [];   // 直近の原付ルート
let carShown = false;

/* ---------- 地図 ---------- */
const map = L.map("map", { zoomControl:false }).setView([35.0, 137.0], 6);
L.control.zoom({ position:"bottomright" }).addTo(map);

/* ベース地図: 日本国内=地理院タイル / 国外=OSM標準タイル を表示位置で自動切替 */
const tileJP = L.tileLayer("https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png", {
  maxZoom: 18, attribution: "地理院タイル"
});
const tileWorld = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19, attribution: "© OpenStreetMap contributors"
});
let curTile = null;
function updateTiles() {
  const c = map.getCenter();
  const want = inJapanLL(c.lat, c.lng) ? tileJP : tileWorld;
  if (curTile !== want) {
    if (curTile) map.removeLayer(curTile);
    want.addTo(map);
    curTile = want;
  }
}
map.on("moveend", () => { updateTiles(); renderRoadLabels(); });
map.on("zoomend", renderRoadLabels);
updateTiles();

/* ---------- ユーティリティ ---------- */
const $ = id => document.getElementById(id);
let toastTimer = null;
function toast(msg, ms) {
  const t = $("toast");
  t.innerHTML = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  if (ms !== 0) toastTimer = setTimeout(() => { t.style.display = "none"; }, ms || 2600);
}
function hideToast(){ $("toast").style.display = "none"; }

function fmtTime(sec) {
  const m = Math.round(sec / 60);
  if (m < 60) return m + "分";
  return Math.floor(m / 60) + "時間" + (m % 60) + "分";
}
function shortName(displayName) {
  if (!displayName) return "";
  const parts = displayName.split(",").map(s => s.trim());
  return parts.slice(0, 3).join(" ");
}

/* polyline6 デコーダ (Valhalla shape) */
function decodePolyline6(str) {
  let index = 0, lat = 0, lon = 0;
  const coords = [];
  while (index < str.length) {
    for (const which of [0, 1]) {
      let shift = 0, result = 0, byte;
      do {
        byte = str.charCodeAt(index++) - 63;
        result |= (byte & 0x1f) << shift;
        shift += 5;
      } while (byte >= 0x20);
      const delta = (result & 1) ? ~(result >> 1) : (result >> 1);
      if (which === 0) lat += delta; else lon += delta;
    }
    coords.push([lat / 1e6, lon / 1e6]);
  }
  return coords;
}

/* ---------- 地点行の描画 ---------- */
function rowPlaceholder(kind, i) {
  if (kind === "start") return "出発地（🔍検索 📍現在地 🗺タップ）";
  if (kind === "goal") return "目的地";
  return "経由地";
}

/* 現在地を任意の地点行にセット（出発地・経由地・目的地すべて対応） */
function useCurrentLocation(i) {
  if (!navigator.geolocation) { toast("この端末では現在地を取得できません"); return; }
  toast('<span class="spin"></span>現在地を取得中…', 0);
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    points[i].lat = lat; points[i].lon = lon; points[i].name = "現在地";
    renderRows(); refreshMarkers(); saveState();
    map.setView([lat, lon], Math.max(map.getZoom(), 14));
    hideToast();
    if (lastTrip) doRoute();   // ルート表示中なら新しい地点で引き直し
  }, () => toast("現在地を取得できませんでした（位置情報の許可を確認）"),
     { enableHighAccuracy: true, timeout: 10000 });
}
function renderRows() {
  const wrap = $("ptrows");
  wrap.innerHTML = "";
  points.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "ptrow";
    const dot = document.createElement("span");
    dot.className = "dot " + p.kind;
    row.appendChild(dot);

    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = rowPlaceholder(p.kind, i);
    input.value = p.name;
    input.autocomplete = "off";
    input.addEventListener("input", () => { p.name = input.value; p.lat = null; p.lon = null; });
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); geocodeRow(i, row, input); }
    });
    input.addEventListener("blur", () => setTimeout(() => closeSuggest(row), 250));
    row.appendChild(input);

    const searchBtn = document.createElement("button");
    searchBtn.className = "rbtn"; searchBtn.textContent = "🔍"; searchBtn.title = "地名を検索";
    searchBtn.addEventListener("click", () => geocodeRow(i, row, input));
    row.appendChild(searchBtn);

    const gpsBtn = document.createElement("button");

  try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? def : v; } catch (e) { return def; }
}
function saveJSON(key, v) { try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {} }

function routeTitle(pts) {
  const s = pts[0], g = pts[pts.length - 1];
  return (s ? s.n : "?") + " → " + (g ? g.n : "?") + (pts.length > 2 ? "（経由" + (pts.length - 2) + "）" : "");

  const d = new Date(t);
  return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate() + " " +
         d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");

function histAdd(trip) {
  const pts = ptsSnapshot();
  const last = histList[histList.length - 1];

  if (last && JSON.stringify(last.pts) + last.v === sig) { last.t = Date.now(); saveHistory(); return; }
  histList.push({ t: Date.now(), v: vehicle, pts, km: trip.summary.length, min: Math.round(trip.summary.time / 60) });
  saveHistory();

/* ---------- ルート検索 (Valhalla) ---------- */
/* 2地点間の大円距離(km)。緯度経度は {lat,lon} 形式 */
function haversineKm(a, b) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lon - a.lon);
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

/* Valhallaへ1回だけリクエストを送る（costingOptionsは呼び出し側で1回だけ組み立てて使い回す） */
async function valhallaRequest(costing, locations, costingOptions) {
  const body = {
    locations: locations,
    costing: costing,
    directions_options: { language: "ja-JP", units: "kilometers" }
  };
  if (costingOptions) body.costing_options = costingOptions;
  const r = await fetch(VALHALLA, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Client-Id": CLIENT_ID },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (!d.trip) {
    const err = new Error((d.error || "不明なエラー") + (d.error_code ? " (code " + d.error_code + ")" : ""));
    err.code = d.error_code;
    err.raw = d;
    throw err;
  }
  return d.trip;
}
/* Valhallaのルート距離上限超過エラーかどうか */
function isDistanceLimitError(err) {
  return !!err && (err.code === 154 || /max.?distance/i.test((err.raw && err.raw.error) || ""));
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ---------- 長距離分割（ガイドルート方式） ----------
   幾何学的中点で分割すると直線中点が山岳地帯等に落ちて大回りになるため、
   まず車(auto)のガイドルートを取得し、そのshapeに沿って分割点を選ぶ。 */
/* ガイドshape座標列の累積距離(km)配列 */
function cumDistances(coords) {
  const cum = [0];
  for (let i = 1; i < coords.length; i++) {
    cum.push(cum[i - 1] + haversineKm(
      { lat: coords[i - 1][0], lon: coords[i - 1][1] },
      { lat: coords[i][0], lon: coords[i][1] }
    ));
  }
  return cum;
}
function guideVtx(g, i) { return { lat: g.coords[i][0], lon: g.coords[i][1] }; }

const guideCache = {};   // 地点ペアごとのガイドルートキャッシュ（候補パターン間で使い回す）
async function getGuide(a, b) {
  const key = a.lat + "," + a.lon + "|" + b.lat + "," + b.lon;
  if (key in guideCache) return guideCache[key];
  let guide = null;
  try {
    const trip = await valhallaRequest("auto", [
      { lat: a.lat, lon: a.lon, type: "break" },
      { lat: b.lat, lon: b.lon, type: "break" }
    ], null);
    const coords = tripShape(trip);
    if (coords.length >= 3) guide = { coords: coords, cum: cumDistances(coords) };
  } catch (e) { /* autoも取れない場合はガイドなし（幾何中点フォールバック） */ }
  guideCache[key] = guide;
  return guide;
}

/* サブ区間のルート取得。距離上限エラーなら seg（ガイドshapeの区間 {g,i0,i1}）の
   累積距離中間にある頂点で二分割して再帰。ガイドがなければ幾何中点で二分割。 */
async function routeChunk(costing, a, b, depth, costingOptions, seg) {
  try {
    const trip = await valhallaRequest(costing, [
      { lat: a.lat, lon: a.lon, type: "break" },
      { lat: b.lat, lon: b.lon, type: "break" }
    ], costingOptions);
    return [trip];
  } catch (err) {
    if (!isDistanceLimitError(err) || depth >= 6) throw err;
    let mid, segL = null, segR = null;
    if (seg && seg.i1 - seg.i0 >= 2) {
      // ガイドshape上の累積距離の中間にある頂点を分割点にする
      const g = seg.g;
      const target = (g.cum[seg.i0] + g.cum[seg.i1]) / 2;
      let mi = seg.i0 + 1;
      while (mi < seg.i1 - 1 && g.cum[mi] < target) mi++;
      mid = guideVtx(g, mi);
      segL = { g: g, i0: seg.i0, i1: mi };
      segR = { g: g, i0: mi, i1: seg.i1 };
    } else {
      // ガイドが使えない場合のみ従来の幾何中点二分割
      mid = { lat: (a.lat + b.lat) / 2, lon: (a.lon + b.lon) / 2 };
    }
    await sleep(150);
    const left = await routeChunk(costing, a, mid, depth + 1, costingOptions, segL);
    await sleep(150);
    const right = await routeChunk(costing, mid, b, depth + 1, costingOptions, segR);
    return left.concat(right);
  }
}

/* 2地点間のルートを取得。距離上限エラーなら車ガイドルートに沿って約120kmごとに
   分割して順に取得し、区間トリップの配列を返す */
async function routePair(costing, a, b, depth, costingOptions) {
  try {
    const trip = await valhallaRequest(costing, [
      { lat: a.lat, lon: a.lon, type: "break" },
      { lat: b.lat, lon: b.lon, type: "break" }
    ], costingOptions);
    return [trip];
  } catch (err) {
    if (!isDistanceLimitError(err) || depth >= 6) throw err;
    await sleep(150);
    const guide = await getGuide(a, b);
    if (!guide) {
      // ガイドが取れない場合は従来の幾何中点二分割にフォールバック
      const mid = { lat: (a.lat + b.lat) / 2, lon: (a.lon + b.lon) / 2 };
      const left = await routeChunk(costing, a, mid, depth + 1, costingOptions, null);
      await sleep(150);
      const right = await routeChunk(costing, mid, b, depth + 1, costingOptions, null);
      return left.concat(right);
    }
    // ガイドshapeに沿って約120kmごとに中間点をサンプリング（端点近くは除く）
    const coords = guide.coords, cum = guide.cum;
    const total = cum[cum.length - 1];
    const n = Math.max(2, Math.ceil(total / 120));
    const idxs = [0];
    for (let k = 1; k < n; k++) {
      const target = total * k / n;
      let i = idxs[idxs.length - 1] + 1;
      while (i < coords.length - 1 && cum[i] < target) i++;
      if (i < coords.length - 1) idxs.push(i);
    }
    idxs.push(coords.length - 1);
    let chunks = [];
    for (let k = 0; k < idxs.length - 1; k++) {
      const pa = k === 0 ? a : guideVtx(guide, idxs[k]);
      const pb = k === idxs.length - 2 ? b : guideVtx(guide, idxs[k + 1]);
      if (k > 0) await sleep(150);
      chunks = chunks.concat(await routeChunk(costing, pa, pb, depth + 1, costingOptions, { g: guide, i0: idxs[k], i1: idxs[k + 1] }));
    }
    return chunks;
  }
}

/* 複数区間のトリップを1本の擬似トリップに連結する。境目の出発/到着系マニューバは間引いて見栄えを整える */
function mergeChunks(chunks) {
  let length = 0, time = 0;
  const legs = [];
  chunks.forEach((trip, idx) => {
    length += trip.summary.length;
    time += trip.summary.time;
    trip.legs.forEach((leg, li) => {
      const maneuvers = leg.maneuvers.slice();
      // 最初のチャンク以外: 先頭legの先頭maneuverが出発系(type1〜3)なら除去
      if (idx > 0 && li === 0 && maneuvers.length) {
        const t = maneuvers[0].type;
        if (t >= 1 && t <= 3) maneuvers.shift();
      }
      // 最後のチャンク以外: 末尾legの末尾maneuverが到着系(type4〜6)なら除去
      if (idx < chunks.length - 1 && li === trip.legs.length - 1 && maneuvers.length) {
        const t = maneuvers[maneuvers.length - 1].type;
        if (t >= 4 && t <= 6) maneuvers.pop();
      }
      legs.push({ shape: leg.shape, maneuvers: maneuvers });
    });
  });
  return { summary: { length: length, time: time }, legs: legs };
}

/* extraOpts: 候補パターンごとの motor_scooter オプション上書き（shortest 等） */
async function valhallaRoute(costing, extraOpts) {
  const locs = points.filter(p => p.lat != null).map(p => ({ lat: p.lat, lon: p.lon, type: "break" }));
  const v = VEHICLES[vehicle];
  // costing_options 等の組み立ては1回だけ行い、分割検索時も使い回す
  let costingOptions = null;
  if (costing === "motor_scooter") {
    lastRegionJP = routeRegionJP();
    lastTopSpeed = currentTopSpeed(lastRegionJP);
    costingOptions = { motor_scooter: Object.assign({
      top_speed: lastTopSpeed,
      use_primary: v.usePrimary,
      use_hills: 0.5,
      toll_booth_penalty: v.tollPenalty
    }, extraOpts || {}) };
  }
  try {
    // まず従来どおり全地点1リクエストを試みる
    return await valhallaRequest(costing, locs, costingOptions);
  } catch (err) {
    if (!isDistanceLimitError(err) || locs.length < 2) throw err;
    // 距離上限エラー: 地点ペアごとに分割検索して結合する
    toast('<span class="spin"></span>長距離ルートを分割検索中…', 0);
    let chunks = [];
    for (let i = 0; i < locs.length - 1; i++) {
      if (i > 0) await sleep(150);
      const pairChunks = await routePair(costing, locs[i], locs[i + 1], 0, costingOptions);
      chunks = chunks.concat(pairChunks);
    }
    return mergeChunks(chunks);
  }
}

function tripShape(trip) {
  let coords = [];
  trip.legs.forEach(leg => {
    const c = decodePolyline6(leg.shape);
    coords = coords.length ? coords.concat(c.slice(1)) : c;
  });
  return coords;
}

/* ---------- ルート候補（複数パターン） ---------- */
/* opts は車種別 costing_options(motor_scooter) にマージして上書きする */
const PATTERNS = [
  { key:"fast",    label:"⚡ 最速",     chip:"⚡最速", opts:{} },
  { key:"short",   label:"📏 距離最短", chip:"📏最短", opts:{ shortest:true } },
  // 幹線優先: カーブの多い山道(use_hills:0.1で強く回避)や住宅街の細道を避け、走りやすい幹線主体で検索
  { key:"primary", label:"🛣 幹線優先", chip:"🛣幹線", opts:{ use_primary:1.0, use_hills:0.1 } }
];
let selPatterns = ["fast"];   // 検索前に選択するパターン（1つ以上・デフォルトは最速のみ）
let candidates = [];   // {pattern, trip, shape}
let candIndex = 0;
let altLayers = [];    // 非選択候補の描画レイヤー

/* 検索パネルのパターン選択チップ行（複数選択トグル） */
function renderPatRow() {
  const row = $("patRow");
  row.innerHTML = "";
  PATTERNS.forEach(p => {
    const b = document.createElement("button");
    b.textContent = p.chip;
    b.className = selPatterns.includes(p.key) ? "on" : "";
    b.addEventListener("click", () => {
      if (selPatterns.includes(p.key)) {
        if (selPatterns.length <= 1) { toast("1つ以上選んでください"); return; }
        selPatterns = selPatterns.filter(k => k !== p.key);
      } else {
        selPatterns.push(p.key);
      }
      renderPatRow(); saveState();
    });
    row.appendChild(b);
  });
}

async function doRoute() {
  const setPts = points.filter(p => p.lat != null);
  if (setPts.length < 2 || points[0].lat == null || points[points.length - 1].lat == null) {
    toast("出発地と目的地を指定してください（🔍検索 か 🗺地図タップ）");
    return;
  }
  const btn = $("routeBtn");
  btn.disabled = true;
  try {
    // 選択中のパターンのみ順次取得（公開サーバーに配慮して150ms間隔）
    const active = PATTERNS.filter(p => selPatterns.includes(p.key));
    const found = [];
    let lastErr = null;
    for (let i = 0; i < active.length; i++) {
      toast('<span class="spin"></span>候補' + (i + 1) + '/' + active.length + 'を検索中…', 0);
      if (i > 0) await sleep(150);
      try {
        const trip = await valhallaRoute("motor_scooter", active[i].opts);
        found.push({ pattern: active[i], trip: trip, shape: tripShape(trip) });
      } catch (err) { lastErr = err; }
    }
    if (!found.length) throw lastErr || new Error("ルートが見つかりません");
    // 距離(0.1km単位)と分が両方同じ候補は重複として除外
    candidates = [];
    const seen = new Set();
    found.forEach(c => {
      const sig = c.trip.summary.length.toFixed(1) + "/" + Math.round(c.trip.summary.time / 60);
      if (seen.has(sig)) return;
      seen.add(sig);
      candidates.push(c);
    });
    selectCandidate(0, true);
    if (carShown) { drawCar().catch(()=>{}); }
    histAdd(candidates[0].trip);   // 検索履歴に記録（選択中候補・全件保持）
    hideToast();
    saveState();
  } catch (err) {
    toast("ルート検索に失敗: " + err.message, 5000);
  } finally {
    btn.disabled = false;
  }
}

/* 候補を選択して表示を切り替える（GPX/お気に入り/共有の対象も切替後の候補になる） */
function selectCandidate(idx, fit) {
  candIndex = idx;
  const c = candidates[idx];
  lastTrip = c.trip;
  lastShape = c.shape;
  drawCandidates(fit);
  showResult(c.trip);
  renderCandRow();
  renderRoadLabels();
}

function drawCandidates(fit) {
  altLayers.forEach(l => map.removeLayer(l));
  altLayers = [];
  if (routeCasing) { map.removeLayer(routeCasing); routeCasing = null; }
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  // 非選択候補を下に描画（線クリックでも選択切替）
  candidates.forEach((c, i) => {
    if (i === candIndex) return;
    const l = L.polyline(c.shape, { color: "#4dabf7", weight: 4, opacity: 0.65 });
    l.on("click", () => selectCandidate(i));
    l.addTo(map);
    altLayers.push(l);
  });
  routeCasing = L.polyline(lastShape, { color: "#ffffff", weight: 9, opacity: 0.9 }).addTo(map);
  routeLayer = L.polyline(lastShape, { color: "#d9480f", weight: 5, opacity: 0.95 }).addTo(map);
  if (fit) map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });
}

/* トリップ内のフェリー航路区間の距離(km)を集計する（分割検索後の擬似トリップでも可） */
function ferryKmOf(trip) {
  let km = 0;
  trip.legs.forEach(leg => leg.maneuvers.forEach(m => {
    if (m.ferry === true && m.length) km += m.length;
  }));
  return km;
}

/* 結果パネル上部の候補チップ行 */
function renderCandRow() {
  const row = $("candRow");
  row.innerHTML = "";
  candidates.forEach((c, i) => {
    const b = document.createElement("button");
    b.className = i === candIndex ? "on" : "";
    b.innerHTML = '<span>' + c.pattern.label + (ferryKmOf(c.trip) > 0 ? ' ⛴' : '') + '</span><span class="cv">' +
      c.trip.summary.length.toFixed(1) + 'km・' + fmtTime(c.trip.summary.time) + '</span>';
    b.addEventListener("click", () => { if (i !== candIndex) selectCandidate(i); });
    row.appendChild(b);
  });
}

/* ---------- ルート線上の道路名ラベル ---------- */
let roadLabels = [];
function clearRoadLabels() {
  roadLabels.forEach(m => map.removeLayer(m));
  roadLabels = [];
}
function roadLabelCount() { return roadLabels.length; }   // 表示中ラベル数（試験用の参照口）
function roadLabelIcon(name) {
  const esc = String(name).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  return L.divIcon({
    className: "",
    html: '<div style="position:absolute;transform:translate(-50%,-50%);font-size:22px;font-weight:700;color:#7a2a00;' +
      'text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,0 0 5px #fff;' +
      'pointer-events:none;white-space:nowrap;">' + esc + '</div>',
    iconSize: [0, 0], iconAnchor: [0, 0]
  });
}
/* street_namesから表示用の道路名を選ぶ。
   優先順: (a)日本国内ならCJK文字を含む名称 → (b)数字だけではない名称 →
   (c)ref番号のみなら 日本国内は国道(1〜507)/県道(508〜)に整形、国外は番号そのまま */
function pickRoadName(names, isJP) {
  if (!names || !names.length) return null;
  if (isJP) {
    const cjk = names.find(n => /[぀-ヿ㐀-鿿]/.test(n));
    if (cjk) return cjk;
  }
  const named = names.find(n => !/^\d+$/.test(String(n).trim()));
  if (named) return named;
  const num = String(names[0]).trim();
  if (!isJP) return num;
  const n = parseInt(num, 10);
  return (n >= 1 && n <= 507 ? "国道" : "県道") + n + "号";
}
/* 選択中トリップのmaneuvers(street_names)から、拡大時のみ道路名ラベルを描く */
function renderRoadLabels() {
  clearRoadLabels();
  if (!lastTrip || map.getZoom() < 13) return;
  // 地域判定: ルート先頭座標が日本国内かどうか（名称の優先度とref番号の整形に使用）
  const isJP = lastShape.length ? inJapanLL(lastShape[0][0], lastShape[0][1]) : lastRegionJP;
  // 道路名区間を組み立てる: 各maneuverのbegin_shape_index〜次maneuverまでがその道路名の区間。
  // 0.3km以上の区間のみ対象とし、連続する同名（整形後の表示名で判定）区間は1つに結合する。
  const segs = [];
  lastTrip.legs.forEach(leg => {
    const coords = decodePolyline6(leg.shape);
    leg.maneuvers.forEach((m, i) => {
      const name = pickRoadName(m.street_names, isJP);
      if (!name || !(m.length >= 0.3)) return;
      const i0 = Math.min(m.begin_shape_index || 0, coords.length - 1);
      const i1 = i + 1 < leg.maneuvers.length
        ? Math.min(leg.maneuvers[i + 1].begin_shape_index, coords.length - 1)
        : coords.length - 1;
      const c = coords.slice(i0, i1 + 1);
      if (!c.length) return;
      const prev = segs[segs.length - 1];
      if (prev && prev.name === name) prev.coords = prev.coords.concat(c);
      else segs.push({ name: name, coords: c });
    });
  });
  // 表示範囲内の区間だけ、区間の累積距離の中央にある頂点へラベルを置く
  const b = map.getBounds();
  const W = b.getWest(), E = b.getEast(), S = b.getSouth(), N = b.getNorth();
  const perName = {};   // 同名ラベルは3個まで
  for (const seg of segs) {
    if (roadLabels.length >= 30) break;   // 表示は最大30個（ルート進行順に間引き）
    if ((perName[seg.name] || 0) >= 3) continue;
    const c = seg.coords;
    let mid = c[0];
    if (c.length > 1) {
      const cum = [0];
      for (let i = 1; i < c.length; i++) {
        cum.push(cum[i - 1] + haversineKm({ lat: c[i - 1][0], lon: c[i - 1][1] }, { lat: c[i][0], lon: c[i][1] }));
      }
      const half = cum[cum.length - 1] / 2;
      let mi = 0;
      while (mi < c.length - 1 && cum[mi] < half) mi++;
      mid = c[mi];
    }
    if (mid[0] < S || mid[0] > N || mid[1] < W || mid[1] > E) continue;   // 表示範囲外は生成しない
    const mk = L.marker([mid[0], mid[1]], { icon: roadLabelIcon(seg.name), interactive: false }).addTo(map);
    roadLabels.push(mk);
    perName[seg.name] = (perName[seg.name] || 0) + 1;
  }
}

async function drawCar() {

function showResult(trip) {
  const v = VEHICLES[vehicle];

  const vehLabel = lastRegionJP ? v.short : (vehicle === "v50" ? "モペッド(EU)" : "125cc級(EU)");

    '<span class="mid">' + fmtTime(s.time) + '</span>' +
    '<span class="veh">🛵 ' + vehLabel + ' 上限' + (lastTopSpeed || currentTopSpeed(lastRegionJP)) + 'km/h</span>';
  // フェリー航路を含む候補は距離の内訳（原付走行分＋フェリー分）を表示
  const ferryKm = ferryKmOf(trip);
  const fn = $("ferryNote");

      d.innerHTML = '<span class="ic">' + icon + '</span><span style="flex:1">' + (m.instruction || "") +
        (m.length > 0.005 ? ' <span class="len">(' + m.length.toFixed(1) + 'km)</span>' : "") + '</span>';
      const pt = legCoords[Math.min(m.begin_shape_index, legCoords.length - 1)];
      d.addEventListener("click", () => { map.setView(pt, 16); });
      mv.appendChild(d);
    });

}

/* ---------- GPX 出力 ---------- */
function exportGpx() {
  if (!lastShape.length) { toast("先にルートを検索してください"); return; }
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const v = VEHICLES[vehicle];
  let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n' +

  points.forEach(p => {

    const label = p.kind === "start" ? "出発" : p.kind === "goal" ? "到着" : "経由";
    gpx += '  <wpt lat="' + p.lat + '" lon="' + p.lon + '"><name>' + esc(label + ": " + p.name) + '</name></wpt>\n';
  });
  gpx += '  <trk><name>' + esc("原付ルート(" + v.short + ") " + (points[0].name || "") + " → " + (points[points.length-1].name || "")) + '</name><trkseg>\n';
  lastShape.forEach(c => { gpx += '    <trkpt lat="' + c[0] + '" lon="' + c[1] + '"/>\n'; });

/* ---------- Googleマップ連携 ---------- */
/* 計算済みの原付ルートを経由地つきGoogleマップ経路URLで開く。
   Googleマップ側は車として再計算するが、ルートshape上の経由地で道筋を固定する */
function openGmap() {
  if (!lastShape.length || !lastTrip) { toast("先にルートを検索してください"); return; }
  const r5 = v => v.toFixed(5);   // 小数5桁に丸めてURLを短くする
  const setPts = points.filter(p => p.lat != null);
  const o = setPts[0], g = setPts[setPts.length - 1];
  // ルートshape上の最寄り頂点index（経由地を進行順に並べるために使用）
  const nearestIdx = (lat, lon) => {
    let bi = 0, bd = Infinity;
    lastShape.forEach((c, i) => {
      const d = Math.abs(c[0] - lat) + Math.abs(c[1] - lon);
      if (d < bd) { bd = d; bi = i; }
    });
    return bi;
  };
  // 1) ユーザー指定の経由地は必ず含める（Google Maps URLの上限9個）
  const wpList = setPts.slice(1, -1).slice(0, 9).map(p => ({ i: nearestIdx(p.lat, p.lon), ll: [p.lat, p.lon] }));
  // 2) 残り枠はルートshapeの累積距離を等分した頂点で埋める（総距離15kmごとに1個目安・合計最大9個）
  const target = Math.min(9, Math.max(2, Math.round(lastTrip.summary.length / 15)));
  const nFill = Math.min(9 - wpList.length, Math.max(0, target - wpList.length));
  if (nFill > 0 && lastShape.length > 2) {
    const cum = [0];
    for (let i = 1; i < lastShape.length; i++) {
      cum.push(cum[i - 1] + haversineKm(
        { lat: lastShape[i - 1][0], lon: lastShape[i - 1][1] },
        { lat: lastShape[i][0], lon: lastShape[i][1] }
      ));
    }
    const totalD = cum[cum.length - 1];
    const used = new Set(wpList.map(w => w.i));
    for (let k = 1; k <= nFill; k++) {
      const t = totalD * k / (nFill + 1);
      let i = 1;
      while (i < lastShape.length - 2 && cum[i] < t) i++;   // 端点の頂点は使わない
      if (used.has(i)) continue;                            // 同一頂点の重複は間引く
      used.add(i);
      wpList.push({ i: i, ll: [lastShape[i][0], lastShape[i][1]] });
    }
  }
  wpList.sort((a, b) => a.i - b.i);   // ルート進行順に並べる
  const url = "https://www.google.com/maps/dir/?api=1" +
    "&origin=" + r5(o.lat) + "," + r5(o.lon) +
    "&destination=" + r5(g.lat) + "," + r5(g.lon) +
    (wpList.length ? "&waypoints=" + encodeURIComponent(wpList.map(w => r5(w.ll[0]) + "," + r5(w.ll[1])).join("|")) : "") +
    "&travelmode=driving";
  toast("Googleマップで開きます（経由地" + wpList.length + "個でルートを固定）。高速道路回避はGoogleマップ側で設定してください", 3000);
  window.open(url, "_blank");
}

/* ---------- 状態の保存 / 共有URL ---------- */
function stateObj() {
  return { v: vehicle, pat: selPatterns.slice(), pts: points.map(p => ({ k: p.kind, n: p.name, la: p.lat, lo: p.lon })) };
}
function saveState() {
  try { localStorage.setItem("gentsukiRoute", JSON.stringify(stateObj())); } catch (e) {}
}
function applyState(st) {
  if (!st || !st.pts) return false;
  vehicle = (st.v === "v125") ? "v125" : "v50";
  // 検索パターン選択の復元（patが無い古いデータはデフォルト=最速のみ）
  const pat = Array.isArray(st.pat) ? st.pat.filter(k => PATTERNS.some(p => p.key === k)) : [];
  selPatterns = pat.length ? pat : ["fast"];
  points = st.pts.map(p => ({ kind: p.k, name: p.n || "", lat: p.la, lon: p.lo }));
  if (!points.length || points[0].kind !== "start") return false;
  return true;
}
function loadState() {
  // 1) 共有URL (#s=...) 優先
  if (location.hash.startsWith("#s=")) {
    try {
      const st = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(location.hash.slice(3))))));
      if (applyState(st)) return "url";
    } catch (e) {}
  }
  // 2) 前回の状態
  try {
    const st = JSON.parse(localStorage.getItem("gentsukiRoute"));
    if (applyState(st)) return "local";
  } catch (e) {}
  return null;
}
async function shareUrl() {
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(stateObj()))));
  const url = location.href.split("#")[0] + "#s=" + encodeURIComponent(b64);
  try {
    if (navigator.share) { await navigator.share({ title: "原付ルート", url: url }); return; }
    await navigator.clipboard.writeText(url);
    toast("共有URLをコピーしました");
  } catch (e) {
    prompt("この URL をコピーしてください", url);
  }
}

/* ---------- 車種切替 ---------- */
function setVehicle(v) {
  vehicle = v;
  $("veh50").classList.toggle("active", v === "v50");
  $("veh125").classList.toggle("active", v === "v125");
  saveState();
  if (lastTrip) doRoute();   // 表示中ルートを新条件で引き直し
}

/* ---------- イベント ---------- */
$("veh50").addEventListener("click", () => setVehicle("v50"));
$("veh125").addEventListener("click", () => setVehicle("v125"));
$("routeBtn").addEventListener("click", doRoute);
$("addVia").addEventListener("click", () => {
  points.splice(points.length - 1, 0, { kind: "via", name: "", lat: null, lon: null });
  renderRows();
});
$("swapBtn").addEventListener("click", () => {
  const a = points[0], b = points[points.length - 1];
  const tmp = { name: a.name, lat: a.lat, lon: a.lon };
  a.name = b.name; a.lat = b.lat; a.lon = b.lon;
  b.name = tmp.name; b.lat = tmp.lat; b.lon = tmp.lon;
  renderRows(); refreshMarkers(); saveState();
  if (lastTrip) doRoute();
});
$("gpxBtn").addEventListener("click", exportGpx);
$("gmapBtn").addEventListener("click", openGmap);
$("favBtn").addEventListener("click", () => {
  const pts = ptsSnapshot();
  if (pts.length < 2 || !lastTrip) { toast("先にルートを検索してください"); return; }
  openForm("⭐ お気に入りに登録", routeTitle(pts), false, name => {
    favs.push({ name, t: Date.now(), v: vehicle, pts });
    saveFavs();
    toast("⭐ 「" + name + "」を登録しました");
  });
});
$("histBtn").addEventListener("click", () => { $("menuSheet").style.display = "none"; openSheet("hist"); });
$("favListBtn").addEventListener("click", () => { $("menuSheet").style.display = "none"; openSheet("fav"); });
$("placeBtn").addEventListener("click", () => {
  $("menuSheet").style.display = "none";
  openForm("🚩 地点を登録", "", true, (name, emoji, picked) => {
    if (!picked) { toast("場所を検索するか、地図をタップしてください"); return; }
    places.push({ id: "p" + Date.now() + Math.floor(Math.random() * 1000), name, emoji, la: picked.lat, lo: picked.lon });
    savePlaces(); renderPlaces();
    toast(emoji + " 「" + name + "」を登録しました");
    map.setView([picked.lat, picked.lon], Math.max(map.getZoom(), 14));
  }, true);
});
$("sheetClose").addEventListener("click", closeSheet);
let clearArmed = false;
$("sheetClear").addEventListener("click", () => {
  if (!clearArmed) {
    clearArmed = true;
    $("sheetClear").textContent = "本当に全消去？";
    setTimeout(() => { clearArmed = false; $("sheetClear").textContent = "全消去"; }, 3000);
    return;
  }
  clearArmed = false;
  $("sheetClear").textContent = "全消去";
  if (sheetKind === "hist") { histList = []; saveHistory(); }
  else { favs = []; saveFavs(); }
  renderSheet();
});
$("shareBtn").addEventListener("click", shareUrl);
$("mvToggle").addEventListener("click", () => {
  const mv = $("maneuvers");
  const show = mv.style.display !== "block";
  mv.style.display = show ? "block" : "none";
  $("mvToggle").classList.toggle("on", show);
});
$("cmpToggle").addEventListener("click", async () => {
  carShown = !carShown;
  $("cmpToggle").classList.toggle("on", carShown);
  if (carShown) {
    toast('<span class="spin"></span>車ルートを検索中…', 0);
    try { await drawCar(); } catch (e) { toast("車ルートの取得に失敗しました"); carShown = false; $("cmpToggle").classList.remove("on"); }
  } else removeCar();
});
$("closeResult").addEventListener("click", () => { $("result").style.display = "none"; });
$("menuBtn").addEventListener("click", () => {
  const s = $("menuSheet");
  s.style.display = s.style.display === "block" ? "none" : "block";
});
$("locBtn").addEventListener("click", () => {
  $("menuSheet").style.display = "none";
  useCurrentLocation(0);
});
$("clearBtn").addEventListener("click", () => {
  $("menuSheet").style.display = "none";
  points = [
    { kind:"start", name:"", lat:null, lon:null },
    { kind:"goal",  name:"", lat:null, lon:null }
  ];
  lastTrip = null; lastShape = [];
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  if (routeCasing) { map.removeLayer(routeCasing); routeCasing = null; }
  altLayers.forEach(l => map.removeLayer(l)); altLayers = [];
  candidates = []; candIndex = 0; $("candRow").innerHTML = "";
  clearRoadLabels();
  removeCar(); carShown = false; $("cmpToggle").classList.remove("on");
  $("result").style.display = "none";
  pickTarget = -1; placeMode = false; $("pickHint").style.display = "none";
  renderRows(); refreshMarkers(); saveState();
});
document.addEventListener("click", e => {
  if (!$("menuSheet").contains(e.target) && e.target !== $("menuBtn")) $("menuSheet").style.display = "none";
});

/* ---------- 起動 ---------- */
(function init() {
  const src = loadState();
  renderRows(); renderPatRow(); refreshMarkers(); renderPlaces();
  const set = points.filter(p => p.lat != null);
  if (set.length) {
    const grp = L.featureGroup(set.map(p => L.marker([p.lat, p.lon])));
    map.fitBounds(grp.getBounds(), { padding: [60, 60], maxZoom: 13 });
    if (src === "url" && set.length >= 2) doRoute();
  }
})();
</script>
